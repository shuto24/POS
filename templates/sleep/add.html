{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-plus-circle"></i> 睡眠を記録
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">起床日</label>
            <input type="date" name="date" class="form-control" value="{{ today }}" required>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label fw-semibold">就寝時刻</label>
              <input type="time" name="sleep_time" class="form-control" required>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">起床時刻</label>
              <input type="time" name="wake_time" class="form-control" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">睡眠の質 <span class="text-muted small">(任意)</span></label>
            <div class="d-flex gap-3">
              {% for i in range(1,6) %}
              <div class="form-check">
                <input class="form-check-input" type="radio" name="quality"
                       id="q{{ i }}" value="{{ i }}">
                <label class="form-check-label" for="q{{ i }}">
                  {{ '★' * i }}
                </label>
              </div>
              {% endfor %}
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">メモ <span class="text-muted small">(任意)</span></label>
            <input type="text" name="memo" class="form-control" maxlength="200"
                   placeholder="例: よく眠れた、途中で目が覚めた">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-check-lg"></i> 登録
            </button>
            <a href="{{ url_for('sleep_log.index') }}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
