{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-plus-circle"></i> 食事を記録
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">日付</label>
            <input type="date" name="date" class="form-control" value="{{ today }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">食事区分</label>
            <div class="d-flex gap-3 flex-wrap">
              {% for mt in meal_types %}
              <div class="form-check">
                <input class="form-check-input" type="radio" name="meal_type"
                       id="mt_{{ mt }}" value="{{ mt }}" {% if loop.first %}checked{% endif %} required>
                <label class="form-check-label" for="mt_{{ mt }}">{{ mt }}</label>
              </div>
              {% endfor %}
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">内容</label>
            <input type="text" name="content" class="form-control" placeholder="例: ご飯・味噌汁・焼き魚" required maxlength="200">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">カロリー <span class="text-muted small">(任意)</span></label>
            <div class="input-group">
              <input type="number" name="calories" class="form-control" min="0" placeholder="0">
              <span class="input-group-text">kcal</span>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">メモ <span class="text-muted small">(任意)</span></label>
            <input type="text" name="memo" class="form-control" maxlength="200">
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-check-lg"></i> 登録
            </button>
            <a href="{{ url_for('meals.index') }}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
