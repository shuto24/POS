<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家計簿アプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">
        <i class="bi bi-wallet2"></i> 家計簿
      </a>
      <div class="navbar-nav ms-auto flex-row gap-3">
        <a class="nav-link text-white" href="{{ url_for('index') }}">
          <i class="bi bi-list-ul"></i> 一覧
        </a>
        <a class="nav-link text-white" href="{{ url_for('add') }}">
          <i class="bi bi-plus-circle"></i> 追加
        </a>
        <a class="nav-link text-white" href="{{ url_for('summary') }}">
          <i class="bi bi-bar-chart"></i> 集計
        </a>
        <a class="nav-link text-white" href="{{ url_for('budget') }}">
          <i class="bi bi-piggy-bank"></i> 予算
        </a>
      </div>
    </div>
  </nav>

  <div class="container mt-4 pb-5">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
