{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-plus-circle"></i> 本を追加
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">タイトル <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" required maxlength="200">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">著者</label>
            <input type="text" name="author" class="form-control" maxlength="100">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">状態</label>
            <select name="status" class="form-select" required>
              {% for val, label in statuses.items() %}
                <option value="{{ val }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label fw-semibold">評価</label>
              <select name="rating" class="form-select">
                <option value="">—</option>
                {% for i in range(1,6) %}
                  <option value="{{ i }}">{{ '★' * i }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col">
              <label class="form-label fw-semibold">総ページ数</label>
              <input type="number" name="total_pages" class="form-control" min="1">
            </div>
          </div>
          <div class="row mb-3">
            <div class="col">
              <label class="form-label fw-semibold">開始日</label>
              <input type="date" name="start_date" class="form-control">
            </div>
            <div class="col">
              <label class="form-label fw-semibold">読了日</label>
              <input type="date" name="end_date" class="form-control">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">感想・メモ</label>
            <textarea name="memo" class="form-control" rows="3" maxlength="500"></textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1">
              <i class="bi bi-check-lg"></i> 登録
            </button>
            <a href="{{ url_for('books.index') }}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
